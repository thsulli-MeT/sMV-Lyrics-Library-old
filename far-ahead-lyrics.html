<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Far Ahead — Lyrics Poster</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="lyrics-page">
      <a class="back-link" href="index.html">← Back to sMV Lyrics Library</a>

      <article class="lyrics-poster image-only">
        <header class="poster-head">
          <p class="eyebrow">Official uploaded lyrics page</p>
          <h1>Far Ahead</h1>
          <p class="genre">Alt Pop Rock</p>
        </header>

        <figure class="lyrics-image-wrap">
          <img src="assets/far-ahead-lyrics.png" alt="Far Ahead official lyrics poster" onerror="this.src='https://i.ytimg.com/vi/5mtadX0PJ6o/maxresdefault.jpg'" />
        </figure>

        <footer class="poster-footer">
          <a href="https://www.youtube.com/watch?v=5mtadX0PJ6o" target="_blank" rel="noopener noreferrer">Watch on YouTube</a>
          <a href="assets/far-ahead-lyrics.png" download="far-ahead-lyrics.png">Download Full-Size Lyrics PNG</a>
        </footer>
      </article>
    </main>
  </body>
</html>
