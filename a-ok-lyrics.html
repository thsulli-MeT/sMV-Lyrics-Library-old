<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A OK — Lyrics Poster</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="lyrics-page">
      <a class="back-link" href="index.html">← Back to sMV Lyrics Library</a>

      <article class="lyrics-poster image-only">
        <header class="poster-head">
          <p class="eyebrow">Official uploaded lyrics page</p>
          <h1>A OK</h1>
          <p class="genre">Alt Pop Reggae</p>
        </header>

        <figure class="lyrics-image-wrap">
          <img src="assets/a-ok-lyrics.jpg" alt="A OK official lyrics poster" onerror="this.src='https://i.ytimg.com/vi/mwrclIw6D9U/maxresdefault.jpg'" />
        </figure>

        <footer class="poster-footer">
          <a href="https://www.youtube.com/watch?v=mwrclIw6D9U" target="_blank" rel="noopener noreferrer">Watch on YouTube</a>
          <a href="assets/a-ok-lyrics.jpg" download="a-ok-lyrics.jpg">Download Full-Size Lyrics JPG</a>
        </footer>
      </article>
    </main>
  </body>
</html>
